version: "3.8"

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: "./eventease-backend"
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - ./eventease-backend/.env.production
  frontend:
    build: "./eventease-frontend"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./eventease-frontend/.env.production