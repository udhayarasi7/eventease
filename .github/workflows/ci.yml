name: MERN CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: eventease-backend/package-lock.json

      - name: Install dependencies
        working-directory: ./eventease-backend
        run: npm install

      - name: Run tests
        working-directory: ./eventease-backend
        env:
         PORT: ${{ secrets.PORT }}
         MONGO_URI: ${{ secrets.MONGO_URI }}
         CLIENT_URL: ${{ secrets.CLIENT_URL }}
         JWT_SECRET: ${{ secrets.JWT_SECRET }}

        run: npm test